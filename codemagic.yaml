# Codemagic CI/CD Configuration for Laundry Hero Dashboard Android App
#
# Setup Instructions:
# 1. Create a Codemagic account and connect your repository
# 2. Configure version numbers in Codemagic environment variables:
#    - ANDROID_VERSION_CODE: Integer version code (must be higher than Play Store version)
#    - ANDROID_VERSION_NAME: String version name (e.g., "1.2.3")
# 3. No additional environment variables needed - all credentials are embedded
# 4. The keystore is embedded as base64 in the ANDROID_KEYSTORE variable
#
# This configuration builds the Android AAB for manual download and testing.
# For Google Play Store publishing, manually upload the AAB and manage version codes.

environment_variables:
  # Version Configuration - UPDATE THESE BEFORE EACH BUILD
  ANDROID_VERSION_CODE: 2  # Must be higher than current Play Store version (e.g., if Play Store has 1, set to 2)
  ANDROID_VERSION_NAME: "1.1"  # User-visible version string (e.g., "1.1", "2.0.1")
  # Supabase Configuration
  SUPABASE_URL: "https://eqbogpvabcsngspphjte.supabase.co"
  SUPABASE_ANON_KEY: "eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6ImVxYm9ncHZhYmNzbmdzcHBoanRlIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzY3NjcxMjMsImV4cCI6MjA5MjM0MzEyM30.EN5bPu66_y5xN1i_EKxMbFKJoKb9jAmuIBxGUTRSMPk"
  # Paystack Configuration
  PAYSTACK_PUBLIC_KEY: "pk_live_671fccd651daf066804466572cfd0b7c47df2471"
  # Keystore Configuration
  HW_KEYSTORE_PASSWORD: "HWMerchant@Genesis2025!Hw#"
  HW_KEY_PASSWORD: "HWMerchant@Genesis2025!Hw#"
  HW_KEY_ALIAS: "highestwash-merchant"
  ANDROID_KEYSTORE: ""
  # VAPID Keys for Push Notifications
  VITE_VAPID_PUBLIC_KEY: "BHnAKnfcFbA1kMvjxAQTSTpYemv11cgNh6HjWWkrlzH8-VU1zbJIwqcUkKdqLu56bUCkmvct6oK45XiWl5ydhUM"
  # Android SDK Configuration
  ANDROID_HOME: "/usr/local/android-sdk"
  ANDROID_SDK_ROOT: "/usr/local/android-sdk"
  JAVA_HOME: "/usr/local/android-sdk"

workflows:
  android-workflow:
    name: Android Build
    max_build_duration: 30
    environment:
      node: latest
      java: 21
    scripts:
      - name: Install dependencies
        script: |
          npm ci
      - name: Setup Android SDK
        script: |
          echo "y" | $ANDROID_HOME/tools/bin/sdkmanager --install 'platform-tools' 'platforms;android-35' 'build-tools;34.0.0'
      - name: Create keystore file
        script: |
          echo $ANDROID_KEYSTORE | base64 -d > android/app/highestwash-merchant.keystore
      - name: Build Android AAB
        script: |
          cd android
          chmod +x gradlew
          ./gradlew bundleRelease
    artifacts:
      - android/app/build/outputs/bundle/release/app-release.aab